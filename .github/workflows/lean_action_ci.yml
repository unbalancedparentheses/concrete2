name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  grammar:
    name: LL(1) grammar check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Python LL(1) checker
        run: python3 scripts/check_ll1.py grammar/concrete.ebnf

      - name: Run C LL(1) checker
        run: |
          cc -Wall -Wextra -Werror -O2 -o /tmp/check_ll1 scripts/check_ll1.c
          /tmp/check_ll1 grammar/concrete.ebnf

      - name: Run Rust LL(1) checker
        run: |
          rustc -O -o /tmp/check_ll1_rs scripts/check_ll1.rs
          /tmp/check_ll1_rs grammar/concrete.ebnf

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lean (via lean-action)
        uses: leanprover/lean-action@v1
        with:
          build-args: "--log-level=warning"

      - name: Check for build warnings
        run: |
          OUTPUT=$(lake build 2>&1)
          if echo "$OUTPUT" | grep -i "warning"; then
            echo "::error::Build produced warnings"
            echo "$OUTPUT"
            exit 1
          fi

      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang

  main-tests:
    name: Main test suite
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Lean (via lean-action)
        uses: leanprover/lean-action@v1
        with:
          build-args: "--log-level=warning"

      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Run main test suite
        run: |
          for attempt in 1 2 3; do
            if SKIP_FLAKY_TCP_TEST=1 ./run_tests.sh; then
              exit 0
            fi
            echo "Main test suite failed on attempt $attempt"
          done
          exit 1

  ssa-tests:
    name: SSA test suite
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Lean (via lean-action)
        uses: leanprover/lean-action@v1
        with:
          build-args: "--log-level=warning"

      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Run SSA test suite
        run: bash ./test_ssa.sh

  examples:
    name: Examples (non-blocking)
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Lean (via lean-action)
        uses: leanprover/lean-action@v1
        with:
          build-args: "--log-level=warning"

      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Compile all examples
        run: |
          BIN=".lake/build/bin/concrete"
          PASS=0
          FAIL=0
          EXPECTED_FAIL="check_errors"
          for f in examples/*.con; do
            name=$(basename "$f" .con)
            if [ "$name" = "$EXPECTED_FAIL" ]; then
              continue
            fi
            if $BIN "$f" -o "/tmp/${name}" > /dev/null 2>&1; then
              PASS=$((PASS + 1))
            else
              echo "FAIL: $f"
              $BIN "$f" -o "/tmp/${name}" 2>&1 | head -5
              FAIL=$((FAIL + 1))
            fi
          done
          echo ""
          echo "=== Examples: $PASS compiled, $FAIL failed (skipped: $EXPECTED_FAIL) ==="
          if [ "$FAIL" -gt 0 ]; then
            exit 1
          fi

      - name: Run compiled examples (smoke test)
        run: |
          CRASH=0
          for f in examples/*.con; do
            name=$(basename "$f" .con)
            if [ "$name" = "check_errors" ]; then continue; fi
            if [ -f "/tmp/${name}" ]; then
              timeout 5 /tmp/${name} > /dev/null 2>&1 || rc=$?
              rc=${rc:-0}
              if [ "$rc" -eq 139 ] || [ "$rc" -eq 134 ] || [ "$rc" -eq 136 ]; then
                echo "CRASH (exit $rc): $name"
                CRASH=$((CRASH + 1))
              fi
            fi
          done
          echo "=== Runtime crashes: $CRASH ==="
          if [ "$CRASH" -gt 0 ]; then
            exit 1
          fi
