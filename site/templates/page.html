{% extends "base.html" %}

{% block content %}
<article class="doc-page">
  <header class="section-head narrow">
    {% if page.ancestors and page.ancestors | length > 0 %}
      {% set parent = get_section(path=page.ancestors | last) %}
      <p class="eyebrow"><a href="{{ parent.permalink }}">{{ parent.title }}</a></p>
    {% endif %}
    <h1>{{ page.title }}</h1>
  </header>
  <div class="doc-body">
    {{ page.content | safe }}
  </div>
</article>
{% endblock content %}
